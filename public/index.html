<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Cloud Crew - AI Code Review</title>
    <style>
        body { font-family: system-ui, sans-serif; background-color: #1e1e1e; color: #fff; padding: 20px; max-width: 800px; margin: auto; }
        textarea { width: 100%; height: 200px; background: #2d2d2d; color: #00ffcc; padding: 10px; font-family: monospace; border: 1px solid #444; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; margin-top: 10px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background: #0056b3; }
        pre { background: #000; padding: 15px; border-radius: 5px; white-space: pre-wrap; margin-top: 20px; }
        #loading { display: none; color: #ffeb3b; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Team Cloud Crew AI Reviewer</h1>
    <p>Paste your Java or C code below:</p>
    
    <textarea id="codeInput" placeholder="public class Main { ... }"></textarea>
    <button onclick="submitCode()">Review Code</button>
    <p id="loading">Analyzing your code... please wait.</p>

    <div id="outputArea">
        <pre id="resultText"></pre>
    </div>

    <script>
        async function submitCode() {
            const code = document.getElementById('codeInput').value;
            const resultText = document.getElementById('resultText');
            const loading = document.getElementById('loading');

            if (!code) return alert("Please enter some code!");

            // Show loading text, clear previous results
            loading.style.display = 'block';
            resultText.innerText = '';

            try {
                // Send the data to our Node.js Backend
                const response = await fetch('/api/review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });

                const data = await response.json();
                
                // Display the AI response
                resultText.innerText = data.result || data.error;
            } catch (error) {
                resultText.innerText = "Error connecting to the server.";
            } finally {
                // Hide loading text
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
